<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/form.css">
  <title>Inventory Search</title>
</head>
<body>
    <div>
        <h1>Inventory Search</h1>
        
        <form id="searchForm">
            <label for="id">ID:</label>
            <input type="text" id="id" name="id" required>
            
            <input type="checkbox" id="has_photo" name="has_photo">
            <label for="has_photo">Include photo in description</label>
            
            <button type="submit">Search</button>
            <a href="/Menu.html" style="text-decoration: none; margin-top: 10px; display: block;">
              <button class="return-btn" type="button" >Back to Menu</button>
            </a>
        </form>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const searchId = document.getElementById('id').value.trim();
            
            const hasPhotoChecked = document.getElementById('has_photo').checked;
            let targetUrl = `/Output.html?id=${encodeURIComponent(searchId)}`;

            if (hasPhotoChecked) {
                targetUrl += '&has_photo=true';
            }

            window.location.href = targetUrl;
        });
    </script>
</body>
</html>
